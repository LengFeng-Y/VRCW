name = "vrcw"
main = "worker.js"
# Static Assets binding requires compatibility_date >= 2024-09-23.
compatibility_date = "2024-11-01"
assets = { directory = "./public" }
workers_dev = true

[placement]
mode = "smart"

# Observability: keep logs+traces enabled. The parent `enabled` flag is a more
# recent convenience; child sections take precedence in current schema, but we
# keep them aligned to avoid confusion.
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
